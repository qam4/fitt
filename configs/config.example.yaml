# FITT Gateway - example configuration
#
# Copy this file to ~/.fitt/config.yaml and edit with your values.
# Do NOT put secrets (API keys, tokens) in this file - those go in
# ~/.fitt/secrets.yaml.
#
# Design principle: clients name *aliases* like `fitt-smart`, never
# concrete model IDs. Swapping models is a config-only change.

server:
  # Binding host. 0.0.0.0 + OS firewall rule restricting to the
  # Tailscale interface is the recommended setup.
  host: 0.0.0.0
  # Default port 8421 was chosen to avoid common collisions:
  # 8080 is QNAP's admin UI and Tomcat's default; 8000/8888 are
  # common dev-server defaults; 8443 is HTTPS-alt. Override per
  # deployment via the FITT_PORT env var (wins over this value).
  port: 8421
  log_level: info
  # log_bodies: true enables request/response body logging for debug.
  # Default is false - bodies contain user prompts, keep them out of
  # the log in normal operation.
  log_bodies: false

# ------------------------------------------------------------------
# Aliases
# ------------------------------------------------------------------
# Logical role names that clients ask for. Every client (IDE, phone,
# future Telegram bot) names one of these; the router resolves each
# alias to the `models:` entry below.
aliases:
  fitt-default: qwen-coder-big      # everyday coding turns (local)
  fitt-smart:   openrouter-sonnet   # hard turns (cloud)
  fitt-fast:    qwen-coder-small    # cheap helpers (local)

# ------------------------------------------------------------------
# Models
# ------------------------------------------------------------------
# Each entry is a concrete model configuration. `id` is referenced by
# aliases and by `fallback`. `backend` + `model` map to LiteLLM's
# provider naming convention.

# Per-call timeout passed to LiteLLM for every dispatched request.
# When this fires before the upstream replies, the gateway returns
# a typed `upstream_silent` 503 error instead of waiting forever
# (the bug we hit on 2026-05-13: NVIDIA Build queue depth made
# requests take 15 min while the bot's hardcoded 120s read-timeout
# fired first, leaving the bot showing "gateway unreachable" while
# the gateway eventually paid for tokens nobody saw).
#
# **The bot's gateway HTTP read-timeout MUST be strictly greater
# than this value.** Otherwise the bot disconnects before the
# gateway can return the structured error, recreating the same
# bug. Default bot read-timeout is 360s, so the 60s margin is
# comfortable. Tune both together.
upstream_timeout_secs: 300

models:

  # --- Cloud: OpenRouter (primary cloud backend) ---
  # OpenRouter proxies many providers through one API key and supports
  # free-tier models. Get a key at https://openrouter.ai/keys.
  #
  # Free alternative model example (no cost): comment out the paid
  # Sonnet and change the alias target to `openrouter-qwen-free`.

  - id: openrouter-sonnet
    backend: openrouter
    model: anthropic/claude-sonnet-4.5   # via OpenRouter
    cost_per_mtok_in:  3.00
    cost_per_mtok_out: 15.00

  - id: openrouter-qwen-free
    backend: openrouter
    model: qwen/qwen-2.5-coder-32b-instruct:free
    cost_per_mtok_in:  0
    cost_per_mtok_out: 0

  # --- Cloud: Nvidia Build (free tier, OpenAI-compatible) ---
  # Nvidia hosts a number of open-weight models behind an
  # OpenAI-compatible API at integrate.api.nvidia.com. Sign up at
  # https://build.nvidia.com/ for a free key (prefixed `nvapi-`) and
  # add it to secrets.yaml under `api_keys.<model-id>`. Then bind an
  # alias (e.g. fitt-huge) to the model id you uncomment.
  #
  # The `backend: openai` value is the generic OpenAI-compatible
  # backend; it works for Groq, Together, Fireworks, LM Studio, a
  # local vLLM server, and anything else that speaks the same schema.
  #
  # - id: nvidia-minimax-m2
  #   backend: openai
  #   model: minimaxai/minimax-m2
  #   endpoint: https://integrate.api.nvidia.com/v1
  #   cost_per_mtok_in:  0
  #   cost_per_mtok_out: 0

  # --- Cloud: direct Anthropic (disabled by default) ---
  # Uncomment the block below AND add `anthropic_api_key` to
  # secrets.yaml if you want to hit Anthropic directly (usually only
  # worth it for prompt caching or enterprise features).
  #
  # - id: claude-sonnet-direct
  #   backend: anthropic
  #   model: claude-sonnet-4-5
  #   cost_per_mtok_in:  3.00
  #   cost_per_mtok_out: 15.00

  # --- Local: Ollama on the laptop (high-VRAM compute) ---
  # Replace 100.x.y.z with your laptop's Tailscale IP.
  # `ollama` must be running and `OLLAMA_HOST=0.0.0.0` set on the
  # laptop so the desktop can reach it.
  - id: qwen-coder-big
    backend: ollama
    endpoint: http://100.x.y.z:11434
    model: qwen2.5-coder:14b
    fallback: qwen-coder-small

  # --- Local: Ollama on the desktop (always-on fallback) ---
  - id: qwen-coder-small
    backend: ollama
    endpoint: http://localhost:11434
    model: qwen2.5-coder:7b

# ------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------
# All runtime paths default to `$FITT_HOME/<subdir>`. $FITT_HOME is
# set by .env (docker) or falls back to `~/.fitt/` (bare-metal). You
# only need entries in this section if you want to override those
# defaults - e.g. to point logs at a separate disk. Use an absolute
# path when overriding; `~` is expanded against the process's $HOME,
# not against $FITT_HOME, and that distinction is easy to get wrong.
logging:
  # dir: /absolute/override/only/if/you/care
  retention_days: 30

# ------------------------------------------------------------------
# Memory (Phase 2 + Phase 5)
# ------------------------------------------------------------------
# Persistent memory: identity files always injected + today's
# conversation history per session + learned corrections (lessons)
# and decayed past-days context. All on-disk, plain markdown.
# Set enabled: false to revert to stateless Phase 1 behaviour.
memory:
  enabled: true
  # Approximate character budget for history injected into each
  # request. ~4 chars per token, so 24000 chars is ~6000 tokens.
  # If today's log (+ yesterday's first turn + N-day summary
  # layer) exceeds this, oldest layers drop first from the
  # prompt — files on disk are not touched.
  max_history_chars: 24000
  # identity_dir and sessions_dir default to $FITT_HOME/identity
  # and $FITT_HOME/sessions. Uncomment with an absolute path only
  # if you need a different location.
  # identity_dir: /absolute/override/only/if/you/care
  # sessions_dir: /absolute/override/only/if/you/care

  # Phase 5 — lessons ceiling. `learn_add` past this drops the
  # oldest entry. 50 is generous; raise only if your system
  # prompt starts feeling thin on what the agent "remembers."
  max_lessons: 50

  # Phase 5 — history retention for the background pruner.
  # Files in sessions/*/history/YYYY-MM-DD.md past this age get
  # deleted once a day. Turns inside files past this age also
  # drop from the decay injection. Default 90 days.
  history_max_days: 90

  # Phase 4.10 — skills loader. The directory the loader walks
  # at boot for SKILL.md files (operator-authored markdown
  # recipes the agent reads on demand). Default $FITT_HOME/skills.
  skills_dir: skills/
  # Set to false to skip the loader entirely and omit the
  # [Skills available] block from the system prompt. Useful
  # for reverting to pre-Phase-4.10 behaviour without removing
  # the directory.
  skills_enabled: true

# ------------------------------------------------------------------
# Web search (Phase 4.11)
# ------------------------------------------------------------------
# The agent can call web_search(query) to fetch fresh info from
# the web. The default backend is ddgs (DuckDuckGo via the ddgs
# Python package; no API key required). When future providers
# ship (SearXNG, Brave-free, Exa, ...), swap the backend name
# here without editing code.
web:
  search_backend: ddgs

# ------------------------------------------------------------------
# Tools (Phase 4+)
# ------------------------------------------------------------------
# The tool registry picks sane defaults — reads auto-approve,
# writes (write_file, edit_file, git_commit) require approval.
# Override here per tool or per client tag.
#
# Most operators don't need this block at all. The common reasons
# to add it:
#
# 1. Loosen write tools for the IDE (Continue shows diffs
#    natively, so an extra prompt is just friction).
# 2. Tighten Open WebUI further than the built-in least-trust
#    default.
# 3. Raise the approval timeout past the 45s default when you
#    want more runway to tap approvals on mobile.
#
# tools:
#   # Global knobs:
#   approval_timeout_secs: 600   # 10 min default — see below
#
#   # Phase 4.5 Task 5.5: detached delivery. When a tool's
#   # approval is still pending at this many seconds, the HTTP
#   # handler returns a placeholder ("⏳ Approval pending ...")
#   # so the client's connection doesn't stall. The remaining
#   # tool-loop work continues in the background and delivers
#   # a late_tool_result / late_tool_rejected event when it
#   # finishes — you see the answer in Telegram or `fitt inbox`.
#   # Unset (default) = never detach, same as pre-4.5 behaviour.
#   # Set below approval_timeout_secs to activate; typical pair:
#   # approval_detach_threshold_secs: 30   +   approval_timeout_secs: 7200
#   approval_detach_threshold_secs: 30
#
#   # Per-tool defaults (can be wildcards for MCP tools):
#   write_file:
#     default: ask
#   edit_file:
#     default: ask
#   git_commit:
#     default: ask
#
#   # Phase 4.5 Task 6: send_message rate limit. Cap on how
#   # many proactive agent-to-user messages a single session
#   # can push per sliding window. Exceeding returns a
#   # structured error with retry_after_secs so the model can
#   # back off. Defaults (60s, 10 msg) balance "a chatty
#   # monitoring cron is fine" with "a runaway loop can't
#   # spam the user".
#   send_message:
#     window_secs: 60
#     max_per_window: 10
#
#   # Per-client overrides: keyed by client tag (ide, telegram,
#   # webui, cli). Flattens "write_file in the IDE should auto-
#   # approve but from Telegram should ask":
#   per_client:
#     ide:
#       write_file: auto
#       edit_file: auto
#       git_commit: auto
#     webui:
#       write_file: block
#       edit_file: block
#       git_commit: block

# ------------------------------------------------------------------
# Orchestration (Phase 12) - OPT-IN, default off
# ------------------------------------------------------------------
# Route a turn as plan -> execute instead of the flat agent loop.
# Keyed by alias name; any alias NOT listed here uses the flat loop
# exactly as before. The whole block is optional - omit it and every
# alias behaves as it did pre-Phase-12.
#
# The planner pass elicits an explicit plan (the model self-elects
# whether a plan is warranted via the `todowrite` tool); the executor
# pass then works the plan with the full toolset. See
# .kiro/specs/phase12-planning-execution/ for the design.
#
# Fail-loud (Principle 11): an entry for an alias that isn't in
# `aliases:` above - or a `planner_alias` that isn't a configured
# alias - refuses to boot.
#
# orchestration:
#   fitt-default:
#     enabled: true
#     # --- everything below is optional ---
#     # Run the PLAN pass on a different alias than the executor:
#     # "plan with a capable (possibly cloud) model, execute with a
#     # fast local one." Empty/omitted = plan on the turn's own alias.
#     planner_alias: fitt-smart
#     # Per-pass iteration budgets. Omit to use the built-in defaults.
#     #   planner_iterations default 1 - the plan is captured on the
#     #     first `todowrite` call, so one model request suffices; this
#     #     also keeps a cloud planner_alias under its requests-per-
#     #     minute limit (a second pass would only produce a reply we
#     #     discard).
#     #   executor_iterations default 15 - a planned turn works a
#     #     multi-step plan and needs more tool round-trips than the
#     #     flat loop's hard-coded 10.
#     planner_iterations: 1
#     executor_iterations: 15

# ------------------------------------------------------------------
# Prompts (Phase 12) - OPT-IN, built-in defaults otherwise
# ------------------------------------------------------------------
# Per-(alias, step) system-prompt overrides for the orchestrator's
# passes. Steps: `plan`, `execute`, `compact`, `recover`. Each step
# has a built-in, model-agnostic default; you only add entries here to
# tune a step's wording for a specific model (or globally).
#
# Resolution precedence for a (step, alias): per-alias override ->
# global `defaults` override -> built-in code default.
#
# Fail-loud (Principle 11): an unknown step name, or a non-string
# value, refuses to boot. (An alias literally named `defaults` is not
# addressable - that key is reserved for the global overrides below.)
#
# prompts:
#   defaults:                 # global per-step default overrides
#     plan: "When a task needs multiple steps, call todowrite first..."
#   fitt-default:             # per-alias per-step overrides
#     plan: "..."
#     execute: "..."
