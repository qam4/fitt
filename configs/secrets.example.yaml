# FITT Gateway - example secrets file
#
# Copy to ~/.fitt/secrets.yaml and fill in real values.
#
# On Windows: restrict permissions so only your user can read:
#   icacls "%USERPROFILE%\.fitt\secrets.yaml" /inheritance:r /grant:r "%USERNAME%:(R,W)"
# On POSIX:
#   chmod 0600 ~/.fitt/secrets.yaml
#
# The gateway refuses to start if this file is world-readable.

# ------------------------------------------------------------------
# Gateway-facing: tokens clients present to FITT
# ------------------------------------------------------------------
# Clients (VS Code + Continue, curl, future Telegram bot, etc.) must
# send `Authorization: Bearer <token>` with one of these values. One
# is enough for personal use.
#
# Generate with:
#   python -c "import secrets; print(secrets.token_urlsafe(32))"
allowed_tokens:
  - name: personal
    token: REPLACE_WITH_LONG_RANDOM_STRING_32_OR_MORE_CHARS

# ------------------------------------------------------------------
# Outbound: keys FITT uses when calling upstreams
# ------------------------------------------------------------------

# OpenRouter - primary cloud backend.
# Get a key at https://openrouter.ai/keys (free tier available).
openrouter_api_key: sk-or-v1-REPLACE_WITH_YOUR_OPENROUTER_KEY

# Anthropic - only needed if you enable the `claude-sonnet-direct`
# model in config.yaml. Disabled by default. Uncomment and fill in if
# you want direct Anthropic access.
# anthropic_api_key: sk-ant-REPLACE_WITH_YOUR_ANTHROPIC_KEY

# Per-model API keys for generic OpenAI-compatible backends
# (`backend: openai` in config.yaml): Nvidia Build, Groq, Together,
# Fireworks, LM Studio, vLLM, ... Each map key is the model's `id`
# in config.yaml; the value is that provider's API key. Local
# endpoints that don't require auth (LM Studio, vLLM) can be omitted.
# api_keys:
#   nvidia-minimax-m2: nvapi-REPLACE_WITH_YOUR_NVIDIA_KEY

# ------------------------------------------------------------------
# Telegram - reserved for Phase 3
# ------------------------------------------------------------------
# Phase 1 does NOT read these. They're here so you can populate the
# file once and not touch it again when Phase 3 ships.
#
# Get a bot token from @BotFather on Telegram.
# Get your numeric user ID from @userinfobot.
#
# telegram:
#   bot_token: 123456:ABC-REPLACE_WITH_YOUR_BOT_TOKEN
#   allowlist_user_ids:
#     - 123456789
