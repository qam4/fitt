# FITT Gateway - example secrets file
#
# Copy to ~/.fitt/secrets.yaml and fill in real values.
#
# On Windows: restrict permissions so only your user can read:
#   icacls "%USERPROFILE%\.fitt\secrets.yaml" /inheritance:r /grant:r "%USERNAME%:(R,W)"
# On POSIX:
#   chmod 0600 ~/.fitt/secrets.yaml
#
# The gateway refuses to start if this file is world-readable.

# ------------------------------------------------------------------
# Gateway-facing: tokens clients present to FITT
# ------------------------------------------------------------------
# Clients (VS Code + Continue, curl, Telegram bot, etc.) must send
# `Authorization: Bearer <token>` with one of these values. One token
# is enough for personal use.
#
# Each token can carry two optional metadata fields:
#
#   - `client:` — which interface is calling. Values: ide, telegram,
#     webui, cli. Drives per-client approval defaults, approval
#     routing (the bot only fetches its own pending approvals), and
#     observability tags. Untagged tokens fall back to `webui`
#     (least-trusted).
#
#   - `mode:` — runtime mode. Values: agent (default), router.
#     `router` makes FITT a thin alias-routing proxy: no capability
#     block, no FITT tool merge into the request's `tools` array,
#     no memory injection, no approval middleware. Use for tools
#     that own their own agent loop (Aider, opencode, Claude Code,
#     Cursor agent mode, Codex, Kiro CLI). See
#     docs/coding-cli-setup.md for the patterns.
#
# Clients can also self-identify the `client` via the `X-FITT-Client`
# request header. FITT's Telegram bot always sends that header, so
# you can leave the `client:` field unset on the bot's token and it
# still works. Set the tag explicitly when you want the config to
# be the single source of truth. (`mode` is token-only — the runtime
# mode isn't something a request gets to declare.)
#
# Generate a token with:
#   python -c "import secrets; print(secrets.token_urlsafe(32))"
allowed_tokens:
  # Your IDE (Continue / Cursor / Kiro) in Chat / Agent mode talking
  # to FITT for full agent layering.
  - name: ide
    client: ide
    token: REPLACE_WITH_LONG_RANDOM_STRING_32_OR_MORE_CHARS

  # A coding CLI (opencode, Aider, Claude Code, Codex, Kiro CLI) that
  # owns its own agent loop and wants FITT as a thin model router.
  # Uncomment + generate a fresh token when you wire one in.
  # - name: opencode
  #   client: ide
  #   mode: router
  #   token: REPLACE_WITH_DIFFERENT_LONG_RANDOM_STRING

  # The Telegram bot uses this to authenticate to the gateway. The
  # bot also sends `X-FITT-Client: telegram` on every request, so the
  # `client:` tag here is belt-and-braces. Uncomment + generate a
  # fresh token when you enable the bot in Phase 3.
  # - name: telegram-bot
  #   client: telegram
  #   token: REPLACE_WITH_DIFFERENT_LONG_RANDOM_STRING

  # Example per-interface additions for later phases:
  # - name: cli-laptop
  #   client: cli
  #   token: REPLACE_WITH_YET_ANOTHER_STRING
  # - name: open-webui
  #   client: webui
  #   token: REPLACE_WITH_YET_ANOTHER_STRING

# ------------------------------------------------------------------
# Outbound: keys FITT uses when calling upstreams
# ------------------------------------------------------------------

# OpenRouter - primary cloud backend.
# Get a key at https://openrouter.ai/keys (free tier available).
openrouter_api_key: sk-or-v1-REPLACE_WITH_YOUR_OPENROUTER_KEY

# Anthropic - only needed if you enable the `claude-sonnet-direct`
# model in config.yaml. Disabled by default. Uncomment and fill in if
# you want direct Anthropic access.
# anthropic_api_key: sk-ant-REPLACE_WITH_YOUR_ANTHROPIC_KEY

# Per-model API keys for generic OpenAI-compatible backends
# (`backend: openai` in config.yaml): Nvidia Build, Groq, Together,
# Fireworks, LM Studio, vLLM, ... Each map key is the model's `id`
# in config.yaml; the value is that provider's API key. Local
# endpoints that don't require auth (LM Studio, vLLM) can be omitted.
# api_keys:
#   nvidia-minimax-m2: nvapi-REPLACE_WITH_YOUR_NVIDIA_KEY

# ------------------------------------------------------------------
# Telegram - reserved for Phase 3
# ------------------------------------------------------------------
# Phase 1 does NOT read these. They're here so you can populate the
# file once and not touch it again when Phase 3 ships.
#
# Get a bot token from @BotFather on Telegram.
# Get your numeric user ID from @userinfobot.
#
# telegram:
#   bot_token: 123456:ABC-REPLACE_WITH_YOUR_BOT_TOKEN
#   allowlist_user_ids:
#     - 123456789
