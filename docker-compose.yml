# FITT hub - three services on one Docker host.
#
# Bring up:     docker compose up -d
# Watch logs:   docker compose logs -f
# Tear down:    docker compose down
#
# Config lives on the host under ${FITT_HOME} (see .env). Every
# container bind-mounts the same directory so config.yaml,
# secrets.yaml, sessions/, identity/, and logs/ are all in one
# place. Back that one folder up, you have everything.
#
# The QNAP install recipe is in docs/quickstart.md. Set FITT_HOME
# to wherever you normally keep app data on your NAS (e.g.
# /share/Public/fitt).

name: fitt

services:
  gateway:
    # Phase 3.5 v0 builds on the target host. Swap the `build:`
    # block for `image: ghcr.io/qam4/fitt-gateway:latest` once
    # CI/CD publishes prebuilt images.
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: fitt-gateway:local
    container_name: fitt-gateway
    # `on-failure:3` instead of the more usual `unless-stopped`.
    # The gateway crashes hard at boot on a bad config, missing
    # secret, syntax error in a freshly-pulled commit, etc. With
    # `unless-stopped`, compose restart-loops the container, the
    # healthcheck eventually marks it `unhealthy`, and the
    # actual reason gets buried in `docker logs`. With
    # `on-failure:3` the container exits visibly: `compose ps`
    # shows `Exited (N)` — a meaningful exit code (2 = config
    # error, others = unexpected crash) — and `docker compose
    # logs fitt-gateway --tail 30` surfaces the friendly error
    # the gateway already prints to stderr.
    #
    # Trade-off: a runtime crash also stops being auto-recovered
    # after 3 attempts. For a single-user hub that's correct: if
    # the gateway has crash-looped 3 times, a fourth restart
    # isn't going to fix it — the operator should know.
    restart: on-failure:3
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      FITT_HOME: /fitt
      FITT_CONFIG_PATH: /fitt/config.yaml
      FITT_SECRETS_PATH: /fitt/secrets.yaml
      # FITT_PORT controls both the uvicorn bind inside the
      # container and the Dockerfile healthcheck. Match
      # GATEWAY_HOST_PORT if you want the same port inside and
      # outside; set them apart to sidestep a host collision
      # (QNAP's admin UI on 8080, for example).
      FITT_PORT: ${FITT_PORT:-8421}
      TZ: ${TZ:-UTC}
    volumes:
      # One mount: /fitt inside the container == $FITT_HOME outside.
      # Holds config.yaml, secrets.yaml, identity/, sessions/, logs/.
      - ${FITT_HOME:?set FITT_HOME in .env}:/fitt
    ports:
      # Reachable over Tailscale on the host. The OS firewall (not
      # compose) is what scopes this to the tailnet.
      - "${GATEWAY_HOST_PORT:-8421}:${FITT_PORT:-8421}"
    # The gateway reaches Ollama satellites over the tailnet. By
    # default, Docker's bridge inherits the host's DNS (your
    # router / ISP), which has no idea what *.ts.net or MagicDNS
    # short names are. Pointing resolution at Tailscale's MagicDNS
    # resolver (100.100.100.100) fixes that. Cloudflare's public
    # resolver follows so lookups for non-tailnet names (e.g.
    # api.openrouter.ai) still work. Only the gateway needs this;
    # the bot and open-webui only reach the gateway itself via
    # Docker service name on the compose bridge.
    dns:
      - 100.100.100.100
      - 1.1.1.1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  telegram-bot:
    # Build context is the repo root so the bot's path-dep on
    # ../gateway resolves (see telegram-bot/Dockerfile comment).
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    image: fitt-telegram-bot:local
    container_name: fitt-telegram-bot
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      gateway:
        # If your Container Station version rejects this condition,
        # drop it and use `depends_on: [gateway]`. The bot retries
        # its gateway connection on startup anyway.
        condition: service_healthy
    environment:
      FITT_HOME: /fitt
      # The bot reaches the gateway by compose service name on the
      # default bridge network; no host-level DNS or IP needed.
      # The port has to match the gateway's FITT_PORT.
      FITT_GATEWAY_URL: http://gateway:${FITT_PORT:-8421}
      TZ: ${TZ:-UTC}
    volumes:
      - ${FITT_HOME:?set FITT_HOME in .env}:/fitt
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  open-webui:
    # Pinned stable tag; bump deliberately in a dedicated PR.
    image: ghcr.io/open-webui/open-webui:v0.3.35
    container_name: fitt-open-webui
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      # Open WebUI talks to the gateway by compose service name,
      # same pattern as the bot. The Bearer token is the same one
      # clients use and lives in your secrets.yaml; surface it to
      # compose via .env as FITT_BEARER_TOKEN.
      OPENAI_API_BASE_URL: http://gateway:${FITT_PORT:-8421}/v1
      OPENAI_API_KEY: ${FITT_BEARER_TOKEN:?set FITT_BEARER_TOKEN in .env}
      # Make THIS file authoritative for Open WebUI config. By
      # default Open WebUI treats many settings (the OpenAI
      # connection URL/key, ENABLE_SIGNUP, ...) as "PersistentConfig":
      # the env value only SEEDS the database on first boot, and after
      # that the DB value wins and the env is ignored. That bit us
      # once - the gateway moved off port 8080 (QNAP's admin UI) to
      # 8421, but Open WebUI kept dialing gateway:8080 from its DB and
      # the model picker went empty. ENABLE_PERSISTENT_CONFIG=false
      # makes Open WebUI re-read these env vars on EVERY boot, so
      # config-as-code holds and the gateway port can never silently
      # drift again.
      #
      # Trade-off: settings changed in the Admin UI no longer survive
      # a restart - they revert to the values here. That is the
      # intended posture for a config-as-code hub: configure via this
      # file, not the UI. (User accounts and chat history are normal
      # DB tables, NOT PersistentConfig, so they are unaffected.)
      ENABLE_PERSISTENT_CONFIG: "false"
      # Signup is now env-authoritative (PersistentConfig is off). The
      # first account to sign up becomes the admin. Default is closed
      # (fail-secure); to bootstrap a fresh install set
      # WEBUI_ENABLE_SIGNUP=true in .env, recreate, create the admin,
      # then set it back to false and recreate. See quickstart step 16.
      ENABLE_SIGNUP: ${WEBUI_ENABLE_SIGNUP:-false}
      ENABLE_COMMUNITY_SHARING: "false"
      ENABLE_OLLAMA_API: "false"
      WEBUI_AUTH: "true"
      TZ: ${TZ:-UTC}
    volumes:
      # Kept under $FITT_HOME so every bit of persistent state for
      # the hub lives in one backup-friendly parent folder.
      - ${FITT_HOME:?set FITT_HOME in .env}/open-webui:/app/backend/data
    ports:
      - "3000:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
